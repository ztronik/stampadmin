<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-TRONIK - Loyalty System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { max-width: 480px; margin: 0 auto; overflow-x: hidden; }
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-bottom-color: #22c55e;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #app { min-height: 100svh; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">

    <div id="app" class="flex-1 flex flex-col"></div>

    <div id="loadingOverlay" class="fixed inset-0 bg-slate-900/85 z-50 hidden flex-col items-center justify-center">
        <span class="loader w-12 h-12 mb-4"></span>
        <p class="text-green-400 font-medium animate-pulse">Memproses data...</p>
    </div>

    <!-- Modal Konfirmasi Global -->
    <div id="confirmModal" class="fixed inset-0 bg-black/70 z-50 hidden flex-col items-center justify-center p-6">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h3 id="confirmTitle" class="text-base font-bold text-white mb-2"></h3>
            <p id="confirmMessage" class="text-sm text-slate-400 mb-6"></p>
            <div class="flex gap-3">
                <button id="confirmNo" class="flex-1 py-2.5 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-semibold text-sm transition-colors">Tidak</button>
                <button id="confirmYes" class="flex-1 py-2.5 bg-green-600 hover:bg-green-500 text-white rounded-xl font-semibold text-sm transition-colors">Ya, Lanjutkan</button>
            </div>
        </div>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxlApkTKy9hVLkPtWhFX85Gwb42CQxn-R5u4RVcIAsYE2wWh3Pg9uiiU1oVU-NC6t7-/exec";

    // ===================== ADMIN CREDENTIALS =====================
    let adminCredentials = { username: 'admin', password: 'admin123' };

    // ===================== STATE =====================
    let state = {
        users: [],
        currentUser: null,
        loginMode: 'member',
        loginInput: '',
        showPassword: false,
        loginUsername: '',
        errorMsg: '',
        searchTerm: '',
        isLoading: false,
        maxStamps: 20,
        stampHistory: [],
        activeMenu: 'stamps',
        activeAdminMenu: 'member',
        confirmInline: null,
        adminMemberPage: 0,
        adminHistoryPage: 0,
        adminMemberSort: 'time',
        adminHistorySort: 'time',
        adminHistorySearch: '',
        adminMemberSearch: '',
        rewards: [
            { id: 1, stamps: 5,  label: 'Diskon 5%',       icon: 'tag' },
            { id: 2, stamps: 10, label: 'Diskon 10%',      icon: 'percent' },
            { id: 3, stamps: 20, label: 'Servis Gratis',   icon: 'wrench' },
            { id: 4, stamps: 30, label: 'Hadiah Spesial',  icon: 'gift' }
        ],
        editMember: null,
        editReward: null,
        showAddReward: false,
        newRewardLabel: '',
        newRewardStamps: '',
        newRewardIcon: 'gift',
        showAddMember: false,
        newMemberName: '',
        newMemberAddress: '',
        newMemberPhone: '',
        memberStampInputs: {},
        memberStampCols: {},
        stampSearch: '',
        showQrScanner: false,
        stampActionType: {},
        redeemMemberId: '',
        redeemRewardId: '',
        redeemMemberSearch: '',
        showRedeemQrScanner: false,
        editingStampCol: null,
        stampMemberPage: 0,
        rewardPage: 0,
        settingUsername: '',
        settingPassword: '',
        settingConfirm: '',
        settingMsg: '',
    };

    // ===================== UTILITIES =====================
    function showLoading(show) {
        // Jangan tampilkan loading overlay saat init awal (sebelum render pertama)
        if (!state._appReady) return;
        document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
    }

    function showConfirm(title, message, onYes, onNo) {
        const modal = document.getElementById('confirmModal');
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMessage').textContent = message;
        modal.style.display = 'flex';
        document.getElementById('confirmYes').onclick = () => { modal.style.display = 'none'; onYes && onYes(); };
        document.getElementById('confirmNo').onclick = () => { modal.style.display = 'none'; onNo && onNo(); };
    }

    function showNotif(message) {
        // Gunakan confirmModal sebagai notif sukses (hanya tombol OK)
        const modal = document.getElementById('confirmModal');
        document.getElementById('confirmTitle').textContent = '✅ Berhasil';
        document.getElementById('confirmMessage').textContent = message;
        modal.style.display = 'flex';
        const btnNo = document.getElementById('confirmNo');
        const btnYes = document.getElementById('confirmYes');
        const prevNoDisplay = btnNo.style.display;
        btnNo.style.display = 'none';
        btnYes.textContent = 'OK';
        btnYes.onclick = () => {
            modal.style.display = 'none';
            btnNo.style.display = prevNoDisplay;
            btnYes.textContent = 'Ya';
        };
    }

    // ===================== AUTO-LOGOUT (ADMIN 5 MENIT) =====================
    // ===================== SESSION PERSISTENCE =====================
    const SESSION_KEY = 'ztronik_session';
    const ADMIN_SESSION_KEY = 'ztronik_admin_session';
    const ADMIN_TIMEOUT_MS = 5 * 60 * 1000;
    let adminTimerInterval = null;
    let adminLastActivity = null;
    let adminSecondsLeft = 0;

    function saveSession() {
        try {
            if (state.currentUser === 'ADMIN') {
                localStorage.setItem(ADMIN_SESSION_KEY, JSON.stringify({ isAdmin: true, lastActivity: adminLastActivity || Date.now(), activeAdminMenu: state.activeAdminMenu }));
                sessionStorage.removeItem(SESSION_KEY);
            } else if (state.currentUser) {
                sessionStorage.setItem(SESSION_KEY, JSON.stringify({ userId: state.currentUser.id, activeMenu: state.activeMenu }));
                localStorage.removeItem(ADMIN_SESSION_KEY);
            } else {
                sessionStorage.removeItem(SESSION_KEY);
                localStorage.removeItem(ADMIN_SESSION_KEY);
            }
        } catch(e) {}
    }

    function clearSession() {
        try { sessionStorage.removeItem(SESSION_KEY); localStorage.removeItem(ADMIN_SESSION_KEY); } catch(e) {}
    }

    function restoreSession() {
        try {
            // Coba restore sesi admin
            const adminRaw = localStorage.getItem(ADMIN_SESSION_KEY);
            if (adminRaw) {
                const a = JSON.parse(adminRaw);
                const lastAct = a.lastActivity || a.loginAt || 0;
                const elapsed = Date.now() - lastAct;
                if (elapsed < ADMIN_TIMEOUT_MS) {
                    state.currentUser = 'ADMIN';
                    state.activeAdminMenu = a.activeAdminMenu || 'member';
                    stopAdminTimer();
                    adminLastActivity = lastAct;
                    adminSecondsLeft = Math.max(0, Math.ceil((ADMIN_TIMEOUT_MS - elapsed) / 1000));
                    adminTimerInterval = setInterval(() => {
                        const el2 = Date.now() - adminLastActivity;
                        adminSecondsLeft = Math.max(0, Math.ceil((ADMIN_TIMEOUT_MS - el2) / 1000));
                        updateTimerDisplay();
                        if (el2 >= ADMIN_TIMEOUT_MS) { stopAdminTimer(); forceLogoutAdmin(); }
                    }, 1000);
                    return;
                } else {
                    clearSession();
                }
            }
            // Coba restore sesi member
            const memberRaw = sessionStorage.getItem(SESSION_KEY);
            if (memberRaw) {
                const m = JSON.parse(memberRaw);
                const user = state.users.find(u => u.id === m.userId);
                if (user) {
                    state.currentUser = user;
                    state.activeMenu = m.activeMenu || 'stamps';
                }
            }
        } catch(e) {}
    }

    function startAdminTimer() {
        stopAdminTimer();
        adminLastActivity = Date.now();
        adminSecondsLeft = ADMIN_TIMEOUT_MS / 1000;
        adminTimerInterval = setInterval(() => {
            const elapsed = Date.now() - adminLastActivity;
            adminSecondsLeft = Math.max(0, Math.ceil((ADMIN_TIMEOUT_MS - elapsed) / 1000));
            updateTimerDisplay();
            if (elapsed >= ADMIN_TIMEOUT_MS) {
                stopAdminTimer();
                forceLogoutAdmin();
            }
        }, 1000);
    }

    function stopAdminTimer() {
        if (adminTimerInterval) { clearInterval(adminTimerInterval); adminTimerInterval = null; }
    }

    function resetAdminTimer() {
        if (state.currentUser === 'ADMIN') {
            adminLastActivity = Date.now();
            adminSecondsLeft = ADMIN_TIMEOUT_MS / 1000;
            // Perbarui timestamp sesi agar refresh tetap valid
            try { localStorage.setItem(ADMIN_SESSION_KEY, JSON.stringify({ isAdmin: true, lastActivity: adminLastActivity, activeAdminMenu: state.activeAdminMenu })); } catch(e) {}
        }
    }

    function updateTimerDisplay() {
        const el = document.getElementById('adminTimer');
        if (!el) return;
        const m = Math.floor(adminSecondsLeft / 60);
        const s = adminSecondsLeft % 60;
        const timeStr = `${m}:${s.toString().padStart(2, '0')}`;
        const isWarning = adminSecondsLeft <= 60;
        el.textContent = `Sesi: ${timeStr}`;
        el.className = `text-xs font-mono px-2 py-1 rounded-lg ${isWarning ? 'bg-red-500/20 text-red-400 border border-red-500/30' : 'bg-slate-700 text-slate-400'}`;
    }

    function forceLogoutAdmin() {
        clearSession();
        state.currentUser = null;
        state.loginInput = '';
        state.loginUsername = '';
        state.errorMsg = '';
        state.showAddMember = false;
        state.editMember = null;
        render();
        // Tampilkan notifikasi setelah render
        setTimeout(() => {
            showConfirm(
                'Sesi Berakhir',
                'Anda telah logout otomatis karena tidak ada aktivitas selama 5 menit.',
                null, null
            );
            // Ubah tombol confirm agar hanya ada OK
            document.getElementById('confirmNo').style.display = 'none';
            document.getElementById('confirmYes').textContent = 'OK';
        }, 100);
    }

    // Pantau aktivitas pengguna untuk reset timer
    ['click', 'touchstart', 'keydown', 'mousemove', 'scroll'].forEach(evt => {
        document.addEventListener(evt, () => { if (state.currentUser === 'ADMIN') resetAdminTimer(); }, { passive: true });
    });

    // Reset semua input saat user kembali ke tab ini
    // ===================== RESET SEMUA INPUT =====================
    function resetAllInputState() {
        state.loginInput        = '';
        state.loginUsername     = '';
        state.errorMsg          = '';
        state.showPassword      = false;
        state.memberStampInputs = {};
        state.memberStampCols   = {};
        state.stampActionType   = {};
        state.newMemberName     = '';
        state.newMemberAddress  = '';
        state.newMemberPhone    = '';
        state.editMember        = null;
        state.showAddMember     = false;
        state.newRewardLabel    = '';
        state.newRewardStamps   = '';
        state.newRewardIcon     = 'gift';
        state.editReward        = null;
        state.showAddReward     = false;
        state.redeemMemberId       = '';
        state.redeemRewardId       = '';
        state.redeemMemberSearch   = '';
        if (state.showRedeemQrScanner) { stopQrStream(); state.showRedeemQrScanner = false; }
        state.editingStampCol   = null;
        state.stampSearch       = '';
        state.settingUsername   = '';
        state.settingPassword   = '';
        state.settingConfirm    = '';
        state.settingMsg        = '';
        state.adminMemberSearch  = '';
        state.adminHistorySearch = '';
        if (state.showQrScanner) { stopQrStream(); state.showQrScanner = false; }
    }

    // Reset & render ulang setiap kali user kembali ke tab ini
    document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
            resetAllInputState();
            render();
        }
    });

    function generateMemberId() {
        return Math.floor(1000000000 + Math.random() * 9000000000).toString();
    }

    function now() {
        return new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function getGlobalHistory() {
        const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
        let all = [];
        state.users.forEach(u => {
            if (u.history) {
                u.history.forEach(h => {
                    if (h.ts && h.ts >= cutoff) {
                        all.push({ ...h, userName: u.name, userId: u.id });
                    }
                });
            }
        });
        return all.sort((a, b) => (b.ts || 0) - (a.ts || 0));
    }

    function pruneOldHistory() {
        const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
        state.users.forEach(u => {
            if (u.history) u.history = u.history.filter(h => !h.ts || h.ts >= cutoff);
        });
    }

    // ===================== API =====================
    async function apiCall(action, payload = {}) {
        if (!GAS_URL || GAS_URL.trim() === "") return mockApiCall(action, payload);
        try {
            showLoading(true);
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action, ...payload })
            });
            const data = await response.json();
            showLoading(false);
            if (!data.success) throw new Error(data.message);
            return data;
        } catch (error) {
            showLoading(false);
            console.error("API Error:", error);
            alert("Terjadi kesalahan koneksi/sistem: " + error.message);
            return { success: false, message: error.message };
        }
    }

    async function mockApiCall(action, payload) {
        return new Promise((resolve) => {
            showLoading(true);
            setTimeout(() => {
                showLoading(false);
                if (action === 'getUsers') {
                    resolve({ success: true, users: state.users });
                } else if (action === 'addMember') {
                    const exists = state.users.find(u => u.phone === payload.phone);
                    if (exists) resolve({ success: false, message: 'Nomor HP sudah terdaftar!' });
                    else {
                        const newUser = { id: generateMemberId(), name: payload.name, address: payload.address || '', phone: payload.phone, stamps: 0, maxStamps: 0, history: [], createdAt: Date.now() };
                        state.users.push(newUser);
                        resolve({ success: true, user: newUser });
                    }
                } else if (action === 'editMember') {
                    const u = state.users.find(u => u.id == payload.id);
                    if (u) { u.name = payload.name; u.address = payload.address; u.phone = payload.phone; }
                    resolve({ success: true });
                } else if (action === 'deleteMember') {
                    state.users = state.users.filter(u => u.id != payload.id);
                    resolve({ success: true });
                } else if (action === 'updateStamps') {
                    const u = state.users.find(u => u.id == payload.id);
                    if (u) {
                        u.stamps = Math.max(0, u.stamps + payload.change);
                        if (!u.history) u.history = [];
                        u.history.push({ date: now(), ts: Date.now(), change: payload.change, total: u.stamps });
                        pruneOldHistory();
                    }
                    resolve({ success: true });
                } else if (action === 'updateMaxStamps') {
                    const u = state.users.find(u => u.id == payload.id);
                    if (u) u.maxStamps = payload.maxStamps;
                    resolve({ success: true });
                } else if (action === 'getRewards') {
                    resolve({ success: true, rewards: state.rewards });
                } else if (action === 'addReward') {
                    const r = { id: Date.now(), label: payload.label, stamps: parseInt(payload.stamps)||0, icon: payload.icon||'gift' };
                    state.rewards.push(r);
                    resolve({ success: true, reward: r });
                } else if (action === 'editReward') {
                    const r = state.rewards.find(r => r.id == payload.id);
                    if (r) { r.label = payload.label; r.stamps = parseInt(payload.stamps)||0; r.icon = payload.icon||'gift'; }
                    resolve({ success: true });
                } else if (action === 'deleteReward') {
                    state.rewards = state.rewards.filter(r => r.id != payload.id);
                    resolve({ success: true });
                } else if (action === 'getSettings') {
                    resolve({ success: true, settings: { admin_username: adminCredentials.username, admin_password: adminCredentials.password, max_stamps: state.maxStamps.toString() } });
                } else if (action === 'saveSettings') {
                    if (payload.admin_username) adminCredentials.username = payload.admin_username;
                    if (payload.admin_password) adminCredentials.password = payload.admin_password;
                    if (payload.max_stamps) state.maxStamps = parseInt(payload.max_stamps) || 20;
                    resolve({ success: true });
                } else if (action === 'loginMember') {
                    const u = state.users.find(u => u.phone === payload.input || u.id === payload.input);
                    if (u) resolve({ success: true, user: u });
                    else resolve({ success: false, message: 'Member tidak ditemukan.' });
                } else {
                    resolve({ success: false, message: 'Aksi tidak dikenali' });
                }
            }, 400);
        });
    }

    // ===================== ACTIONS - LOGIN =====================
    window.setLoginMode = (mode) => { state.loginMode = mode; state.errorMsg = ''; state.loginInput = ''; state.loginUsername = ''; render(); };
    window.handleLoginInput = (val, el) => {
        if (state.loginMode === 'member') {
            const clean = val.replace(/\D/g, '').slice(0, 13);
            state.loginInput = clean;
            if (el && el.value !== clean) el.value = clean;
        } else {
            state.loginInput = val;
        }
    };
    window.handleLoginUsername = (val) => { state.loginUsername = val; };
    window.toggleShowPassword = () => { state.showPassword = !state.showPassword; render(); };

    window.handleLogin = async (e) => {
        e.preventDefault();
        state.errorMsg = '';
        if (state.loginMode === 'member') {
            if (!state.loginInput.trim()) { state.errorMsg = 'Masukkan nomor handphone atau ID member!'; render(); return; }
            const inputVal = state.loginInput.toString();
            const user = state.users.find(u => u.phone.toString() === inputVal || u.id === inputVal);
            if (!user) { state.errorMsg = 'Member tidak ditemukan! Periksa nomor HP atau ID Anda.'; render(); return; }
            state.currentUser = user;
            state.loginInput = '';
            state.errorMsg = '';
            state.activeMenu = 'stamps';
            saveSession();
            render();
        } else if (state.loginMode === 'admin') {
            const uname = state.loginUsername.trim();
            const pass = state.loginInput;
            if (uname === adminCredentials.username && pass === adminCredentials.password) {
                state.currentUser = 'ADMIN';
                const result = await apiCall('getUsers');
                if (result.success) state.users = result.users || [];
                state.loginInput = '';
                state.loginUsername = '';
                state.errorMsg = '';
                state.activeAdminMenu = 'member';
                startAdminTimer();
                saveSession();
                render();
            } else {
                state.errorMsg = 'Username atau password admin salah!';
                render();
            }
        }
    };

    window.handleLogout = () => {
        showConfirm(
            'Konfirmasi Keluar',
            'Apakah Anda yakin ingin keluar dari akun ini?',
            () => {
                stopAdminTimer();
                clearSession();
                state.currentUser = null;
                state.loginInput = '';
                state.loginUsername = '';
                state.errorMsg = '';
                state.showAddMember = false;
                state.editMember = null;
                render();
            }
        );
    };

    // ===================== ACTIONS - MEMBER =====================
    window.setActiveMenu = (menu) => { state.activeMenu = menu; render(); };

    // ===================== ACTIONS - ADMIN =====================
    window.setAdminMenu = (menu) => {
        if (state.showQrScanner) { stopQrStream(); state.showQrScanner = false; }
        state.activeAdminMenu = menu;
        state.adminMemberPage = 0;
        state.adminHistoryPage = 0;
        saveSession();
        render();
    };

    window.handleAdminMemberSearch = (val) => { state.adminMemberSearch = val; state.adminMemberPage = 0; render(); };
    window.handleAdminHistorySearch = (val) => { state.adminHistorySearch = val; state.adminHistoryPage = 0; render(); };
    window.handleAdminMemberSort = (val) => { state.adminMemberSort = val; state.adminMemberPage = 0; render(); };
    window.handleAdminHistorySort = (val) => { state.adminHistorySort = val; state.adminHistoryPage = 0; render(); };

    window.adminNextPage = (list) => { state[list + 'Page']++; render(); };
    window.adminPrevPage = (list) => { if (state[list + 'Page'] > 0) state[list + 'Page']--; render(); };
    window.stampMemberNextPage = () => { state.stampMemberPage++; render(); };
    window.stampMemberPrevPage = () => { if (state.stampMemberPage > 0) state.stampMemberPage--; render(); };
    window.rewardNextPage = () => { state.rewardPage++; render(); };
    window.rewardPrevPage = () => { if (state.rewardPage > 0) state.rewardPage--; render(); };

    // Add Member
    window.toggleAddMember = () => { state.showAddMember = !state.showAddMember; state.newMemberName = ''; state.newMemberAddress = ''; state.newMemberPhone = ''; render(); };
    window.handleNewMemberName = (val) => { state.newMemberName = val; };
    window.handleNewMemberAddress = (val) => { state.newMemberAddress = val; };
    window.handleNewMemberPhone = (val, el) => {
        const clean = val.replace(/\D/g, '').slice(0, 13);
        state.newMemberPhone = clean;
        if (el && el.value !== clean) el.value = clean;
    };

    window.handleAddMember = async (e) => {
        e.preventDefault();
        if (!state.newMemberName.trim()) { alert('Nama harus diisi!'); return; }
        if (!state.newMemberPhone.trim() || state.newMemberPhone.length < 10) { alert('Nomor HP harus diisi minimal 10 digit angka!'); return; }
        const result = await apiCall('addMember', { name: state.newMemberName, address: state.newMemberAddress, phone: state.newMemberPhone });
        if (result.success) {
            if (result.user) state.users.push(result.user);
            state.newMemberName = ''; state.newMemberAddress = ''; state.newMemberPhone = '';
            state.showAddMember = false;
            render();
        } else { alert(result.message); }
    };

    // Edit Member
    window.startEditMember = (id) => {
        const u = state.users.find(u => u.id == id);
        if (u) state.editMember = { id: u.id, name: u.name, address: u.address || '', phone: u.phone };
        render();
    };
    window.cancelEditMember = () => { state.editMember = null; render(); };
    window.handleEditName = (val) => { if (state.editMember) state.editMember.name = val; };
    window.handleEditAddress = (val) => { if (state.editMember) state.editMember.address = val; };
    window.handleEditPhone = (val, el) => {
        if (state.editMember) {
            const clean = val.replace(/\D/g, '').slice(0, 13);
            state.editMember.phone = clean;
            if (el && el.value !== clean) el.value = clean;
        }
    };

    window.saveEditMember = async (e) => {
        e.preventDefault();
        const em = state.editMember;
        if (!em) return;
        if (!em.name.trim()) { alert('Nama tidak boleh kosong!'); return; }
        if (!em.phone.trim() || em.phone.length < 10) { alert('Nomor HP harus minimal 10 digit angka!'); return; }
        const result = await apiCall('editMember', { id: em.id, name: em.name, address: em.address, phone: em.phone });
        if (result.success) {
            const u = state.users.find(u => u.id == em.id);
            if (u) { u.name = em.name; u.address = em.address; u.phone = em.phone; }
            state.editMember = null;
            render();
        } else { alert(result.message); }
    };

    // Delete Member
    window.deleteMember = (id) => {
        const u = state.users.find(u => u.id == id);
        showConfirm('Hapus Member', `Apakah Anda yakin ingin menghapus member "${u ? u.name : ''}"? Semua riwayat stempel akan ikut terhapus.`, async () => {
            const result = await apiCall('deleteMember', { id });
            if (result.success) {
                state.users = state.users.filter(u => u.id != id);
                render();
            } else { alert(result.message); }
        });
    };

    // Stamp actions
    window.handleStampInput = (id, val) => { state.memberStampInputs[id] = Math.max(1, parseInt(val) || 1); };
    window.handleStampActionType = (id, val) => { state.stampActionType[id] = val; };
    window.handleStampSearch = (val) => { state.stampSearch = val; state.stampMemberPage = 0; render(); };

    // Tombol +/- untuk input stempel (tidak re-render, update DOM langsung)
    window.changeStampInput = (id, delta) => {
        const current = state.memberStampInputs[id] !== undefined ? state.memberStampInputs[id] : 1;
        const next = Math.max(1, current + delta);
        state.memberStampInputs[id] = next;
        const el = document.getElementById('stampInput_' + id);
        if (el) el.value = next;
    };

    // Tombol +/- untuk input kolom kartu (tidak re-render, update DOM langsung)
    window.changeColInput = (id, delta) => {
        const u = state.users.find(u => u.id == id);
        const current = state.memberStampCols[id] !== undefined ? state.memberStampCols[id] : (u ? u.maxStamps || state.maxStamps : state.maxStamps);
        const next = Math.max(1, Math.min(100, current + delta));
        state.memberStampCols[id] = next;
        const el = document.getElementById('colInput_' + id);
        if (el) el.value = next;
    };

    window.doStampAction = (id) => {
        const u = state.users.find(u => u.id == id);
        // Baca nilai terbaru dari DOM input jika ada
        const domEl = document.getElementById('stampInput_' + id);
        if (domEl) state.memberStampInputs[id] = Math.max(1, parseInt(domEl.value) || 1);
        const amount = state.memberStampInputs[id] || 1;
        const actionType = state.stampActionType[id] || 'add';
        const change = actionType === 'sub' ? -amount : amount;
        const label = actionType === 'sub' ? `Kurangi ${amount} stempel dari` : `Tambah ${amount} stempel ke`;
        showConfirm(
            actionType === 'sub' ? 'Kurangi Stempel' : 'Tambah Stempel',
            `${label} "${u ? u.name : ''}"?`,
            async () => { await updateStamps(id, change); }
        );
    };

    // QR Scanner
    let qrScannerStream = null;
    let qrScanInterval = null;

    window.toggleQrScanner = async () => {
        if (state.showQrScanner) {
            closeQrScanner();
        } else {
            state.showQrScanner = true;
            render();
            await startQrScanner();
        }
    };

    window.closeQrScanner = () => {
        stopQrStream();
        state.showQrScanner = false;
        render();
    };

    function stopQrStream() {
        if (qrScanInterval) { clearInterval(qrScanInterval); qrScanInterval = null; }
        if (qrScannerStream) { qrScannerStream.getTracks().forEach(t => t.stop()); qrScannerStream = null; }
    }

    async function startQrScanner() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            qrScannerStream = stream;
            const video = document.getElementById('qrVideo');
            if (!video) { stopQrStream(); return; }
            video.srcObject = stream;
            await video.play();

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            qrScanInterval = setInterval(() => {
                if (!video || video.readyState < 2) return;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                try {
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    // Gunakan BarcodeDetector API jika tersedia
                    if (window.BarcodeDetector) {
                        const detector = new window.BarcodeDetector({ formats: ['qr_code'] });
                        detector.detect(canvas).then(codes => {
                            if (codes.length > 0) {
                                const scannedVal = codes[0].rawValue;
                                onQrScanned(scannedVal);
                            }
                        }).catch(() => {});
                    }
                } catch(e) {}
            }, 400);
        } catch(err) {
            state.showQrScanner = false;
            alert('Tidak dapat mengakses kamera: ' + err.message);
            render();
        }
    }

    function onQrScanned(val) {
        stopQrStream();
        state.showQrScanner = false;
        state.stampSearch = val;
        render();
    }

    // Max stamps per member
    window.handleMemberStampCols = (id, val) => { state.memberStampCols[id] = parseInt(val) || state.maxStamps; };
    window.startEditStampCol = (id) => { state.editingStampCol = id; render(); };
    window.cancelEditStampCol = () => { state.editingStampCol = null; render(); };

    window.saveMemberStampCols = (id) => {
        // Baca nilai terbaru dari DOM input jika ada
        const domEl = document.getElementById('colInput_' + id);
        if (domEl) state.memberStampCols[id] = Math.max(1, Math.min(100, parseInt(domEl.value) || state.maxStamps));
        const val = state.memberStampCols[id] || (state.users.find(u=>u.id==id)?.maxStamps) || state.maxStamps;
        if (!val || val < 1) { alert('Jumlah kolom tidak valid!'); return; }
        showConfirm('Atur Kolom Kartu', `Atur kolom stempel menjadi ${val} untuk member ini?`, async () => {
            const result = await apiCall('updateMaxStamps', { id, maxStamps: val });
            if (result.success) {
                const u = state.users.find(u => u.id == id);
                if (u) u.maxStamps = val;
                render();
            }
        });
    };

    window.startEditStampCol = (id) => { state.editingStampCol = id; render(); };
    window.cancelEditStampCol = () => { state.editingStampCol = null; render(); };

    async function updateStamps(id, change) {
        const result = await apiCall('updateStamps', { id, change });
        if (result.success) {
            const user = state.users.find(u => u.id == id);
            if (user) {
                user.stamps = Math.max(0, user.stamps + change);
                if (!user.history) user.history = [];
                user.history.push({ date: now(), ts: Date.now(), change, total: user.stamps });
                pruneOldHistory();
                // Update currentUser if member is viewing
                if (state.currentUser && state.currentUser !== 'ADMIN' && state.currentUser.id == id) {
                    state.currentUser = user;
                }
            }
            render();
        }
    }

    // Rewards
    window.startEditReward = (id) => {
        const r = state.rewards.find(r => r.id == id);
        if (r) state.editReward = { ...r };
        render();
    };
    window.cancelEditReward = () => { state.editReward = null; render(); };
    window.handleEditRewardLabel = (val) => { if (state.editReward) state.editReward.label = val; };
    window.handleEditRewardStamps = (val) => { if (state.editReward) state.editReward.stamps = parseInt(val) || 0; };
    window.handleEditRewardIcon = (val) => { if (state.editReward) state.editReward.icon = val; };

    window.saveEditReward = async (e) => {
        e.preventDefault();
        const er = state.editReward;
        if (!er) return;
        const result = await apiCall('editReward', { id: er.id, label: er.label, stamps: er.stamps, icon: er.icon });
        if (result.success) {
            const r = state.rewards.find(r => r.id == er.id);
            if (r) { r.label = er.label; r.stamps = er.stamps; r.icon = er.icon; }

        state.editReward = null;
        render();

    window.deleteReward = (id) => {
        showConfirm('Hapus Reward', 'Apakah Anda yakin ingin menghapus reward ini?', async () => {
            const result = await apiCall('deleteReward', { id });

    // Redeem reward handlers
    window.handleRedeemMember = (val) => { state.redeemMemberId = val; state.redeemRewardId = ''; state.redeemMemberSearch = ''; render(); };
    window.handleRedeemReward = (id) => { state.redeemRewardId = id; render(); };
    window.handleRedeemMemberSearch = (val) => { state.redeemMemberSearch = val; state.redeemMemberId = ''; state.redeemRewardId = ''; render(); };

    // QR Scanner khusus Redeem Reward
    window.toggleRedeemQrScanner = async () => {

            if (state.showQrScanner) { stopQrStream(); state.showQrScanner = false; }
            state.showRedeemQrScanner = true;
            render();
            await startRedeemQrScanner();

    window.closeRedeemQrScanner = () => { stopQrStream(); state.showRedeemQrScanner = false; render(); };

    async function startRedeemQrScanner() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            qrScannerStream = stream;
            const video = document.getElementById('redeemQrVideo');
            if (!video) { stopQrStream(); return; }
            video.srcObject = stream;
            await video.play();
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            qrScanInterval = setInterval(() => {
                if (!video || video.readyState < 2) return;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                if (window.BarcodeDetector) {
                    const detector = new window.BarcodeDetector({ formats: ['qr_code'] });
                    detector.detect(canvas).then(codes => {
                        if (codes.length > 0) {
                            const scannedVal = codes[0].rawValue;
                            stopQrStream();
                            state.showRedeemQrScanner = false;
                            // Cari member berdasarkan hasil scan (phone atau id)
                            const found = state.users.find(u => u.phone === scannedVal || u.id === scannedVal);
                            if (found) {
                                state.redeemMemberId = found.id;
                                state.redeemMemberSearch = found.name;
                                state.redeemRewardId = '';
                            } else {
                                state.redeemMemberSearch = scannedVal;
                            }
                            render();
                        }
                    }).catch(() => {});
                }
            }, 400);
        } catch(err) {
            state.showRedeemQrScanner = false;
            alert('Tidak dapat mengakses kamera: ' + err.message);
            render();
        }
    }

    window.doRedeemReward = () => {
        const member = state.users.find(u => u.id == state.redeemMemberId);
        const reward = state.rewards.find(r => r.id == state.redeemRewardId);
        if (!member || !reward) return;
        if (member.stamps < reward.stamps) { alert('Stempel tidak mencukupi!'); return; }

        showConfirm(
            'Konfirmasi Penukaran',
            `Tukar reward "${reward.label}" (${reward.stamps} ✦) untuk ${member.name}? Sisa stempel: ${member.stamps - reward.stamps} ✦`,
            async () => {
                const result = await apiCall('updateStamps', { id: member.id, change: -reward.stamps, note: `Redeem: ${reward.label}` });
                if (result.success) {
                    member.stamps = Math.max(0, member.stamps - reward.stamps);
                    if (!member.history) member.history = [];
                    member.history.push({ date: now(), ts: Date.now(), change: -reward.stamps, total: member.stamps, note: `Redeem: ${reward.label}` });
                    pruneOldHistory();
                    if (state.currentUser && state.currentUser !== 'ADMIN' && state.currentUser.id == member.id) {
                        state.currentUser = member;
                    }
                    state.redeemMemberId = '';
                    state.redeemRewardId = '';
                    showNotif(`✅ Berhasil! Reward "${reward.label}" ditukar untuk ${member.name}. Sisa stempel: ${member.stamps} ✦`);
                    render();
                } else {
                    alert(result.message || 'Gagal menukar reward.');
                }
            }
        );
    };

    window.toggleAddReward = () => { state.showAddReward = !state.showAddReward; state.newRewardLabel = ''; state.newRewardStamps = ''; state.newRewardIcon = 'gift'; render(); };
    window.handleNewRewardLabel = (val) => { state.newRewardLabel = val; };

    window.saveSetting = async (e) => {
        e.preventDefault();
        if (!state.settingUsername.trim()) { state.settingMsg = 'Username tidak boleh kosong!'; render(); return; }
        if (state.settingPassword && state.settingPassword !== state.settingConfirm) { state.settingMsg = 'Konfirmasi password tidak cocok!'; render(); return; }
        showConfirm('Simpan Pengaturan', 'Apakah Anda yakin ingin menyimpan perubahan username/password?', async () => {
            const payload = { admin_username: state.settingUsername.trim() };
            if (state.settingPassword) payload.admin_password = state.settingPassword;
            const result = await apiCall('saveSettings', payload);
            if (result.success) {
                adminCredentials.username = state.settingUsername.trim();
                if (state.settingPassword) adminCredentials.password = state.settingPassword;

            state.settingUsername = ''; state.settingPassword = ''; state.settingConfirm = '';

            render();
        });

    // Stamp settings (global default)
    window.handleGlobalMaxStamps = (val) => { state.maxStamps = parseInt(val) || 20; };

    window.saveGlobalMaxStamps = () => {

    // ===================== RENDER MEMBER =====================
    function renderMemberView() {

        const maxStamps = user.maxStamps || state.maxStamps;
        const currentProgress = user.stamps % maxStamps;
        const completedCards = Math.floor(user.stamps / maxStamps);
        const menu = state.activeMenu || 'stamps';

        let stampGridHTML = '';
        for (let i = 0; i < maxStamps; i++) {
            const showStamp = i < currentProgress;
            const classes = showStamp
                ? 'border-green-500 bg-green-500/20 shadow-sm shadow-green-500/20'
                : 'border-slate-600 bg-slate-800';
            const content = showStamp
                ? `<i data-lucide="zap" class="w-5 h-5 text-green-400"></i>`
                : `<span class="text-slate-600 font-bold text-xs">${i + 1}</span>`;
            stampGridHTML += `<div class="aspect-square rounded-full flex items-center justify-center border-2 transition-all duration-300 ${classes}">${content}</div>`;
        }

        // History — always shown, persistent
        const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
        const userHistory = (user.history || []).filter(h => !h.ts || h.ts >= cutoff).slice().reverse();
        let historyHTML = '';
        if (userHistory.length > 0) {
            historyHTML = userHistory.map(entry => `
                <div class="flex items-center justify-between bg-slate-700 p-3 rounded-xl border border-slate-600">
                    <div>
                        <p class="text-sm text-white font-semibold">${entry.date}</p>

                    <span class="px-3 py-1.5 rounded-lg text-sm font-bold min-w-[48px] text-center ${entry.change > 0 ? 'bg-green-500/20 text-green-300 border border-green-500/40' : 'bg-red-500/20 text-red-300 border border-red-500/40'}">

                    </span>
                </div>
            `).join('');
        } else {
            historyHTML = '<p class="text-center text-slate-400 text-sm py-8">Belum ada riwayat stempel</p>';
        }

        const tabs = [
            { id: 'stamps', label: 'Stempel', icon: 'grid-3x3' },
            { id: 'rewards', label: 'Reward', icon: 'gift' },
            { id: 'history', label: 'Riwayat', icon: 'history' },
            { id: 'qr', label: 'QR Code', icon: 'qr-code' },
        ];

        let tabContent = '';
        if (menu === 'stamps') {
            tabContent = `
            <div class="bg-slate-800 rounded-2xl p-5 border border-slate-700 shadow-sm">
                <div class="text-center mb-5">
                    <h3 class="text-base font-bold text-white">Kartu Stempel</h3>
                    <p class="text-sm text-slate-400">Kumpulkan ${maxStamps} stempel untuk reward!</p>
                </div>

                        <div class="bg-slate-900 rounded-xl border border-yellow-500/40 p-3 space-y-2">

            else if (state.adminHistorySort === 'za') allHistory = allHistory.slice().sort((a, b) => (b.userName || '').localeCompare(a.userName || ''));

                        <option value="az"          ${state.adminHistorySort === 'az'          ? 'selected' : ''}>Nama A-Z</option>

                            <label class="block text-xs font-medium text-slate-400 mb-1">Konfirmasi Password Baru</label>

                <div class="flex items-center gap-2">
                    <span id="adminTimer" class="text-xs font-mono px-2 py-1 rounded-lg bg-slate-700 text-slate-400"></span>
                    <button onclick="handleLogout()" class="flex items-center gap-1 bg-slate-700 hover:bg-slate-600 text-red-400 px-3 py-2 rounded-xl text-sm transition-colors">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>

            <!-- Admin Menu Nav -->
            <div class="bg-slate-800 border-b border-slate-700 flex">
                ${adminMenus.map(m => `
                <button onclick="setAdminMenu('${m.id}')" class="flex-1 py-3 flex flex-col items-center gap-1 text-xs font-medium transition-all border-b-2 ${menu === m.id ? 'border-green-500 text-green-400' : 'border-transparent text-slate-500'}">
                    <i data-lucide="${m.icon}" class="w-4 h-4"></i>${m.label}
                </button>`).join('')}
            </div>

            <!-- Content -->
            <div class="flex-1 overflow-y-auto p-4 pb-8">
                ${content}
            </div>

            ${copyrightHTML()}
        </div>`;
    }

    // ===================== RENDER MAIN =====================
    function render() {
        // Simpan info focused element sebelum render (untuk restore search input focus)
        const activeId  = document.activeElement ? document.activeElement.id : null;
        const activeTag = document.activeElement ? document.activeElement.tagName : null;
        const selStart  = (activeTag === 'INPUT') ? document.activeElement.selectionStart : null;
        const selEnd    = (activeTag === 'INPUT') ? document.activeElement.selectionEnd   : null;

        let html;
        if (!state.currentUser) html = renderLoginView();
        else if (state.currentUser === 'ADMIN') html = renderAdminView();
        else html = renderMemberView();

        document.getElementById('app').innerHTML = html;
        lucide.createIcons();
        if (state.currentUser === 'ADMIN') updateTimerDisplay();

        const qrEl = document.getElementById('qrcode');
        if (qrEl && state.currentUser && state.currentUser !== 'ADMIN') {
            qrEl.innerHTML = '';
            new QRCode(qrEl, {
                text: state.currentUser.phone,
                width: 160,
                height: 160,
                colorDark: '#000000',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        // Restore focus ke search input jika ada (agar pengetikan tidak terhenti)
        if (activeId) {
            const el = document.getElementById(activeId);
            if (el && el.tagName === 'INPUT') {
                el.focus();
                try { el.setSelectionRange(selStart, selEnd); } catch(e) {}
            }
        }
    }

    // ===================== COPYRIGHT HTML =====================
    function copyrightHTML() {
        return `<div class="text-center py-3 text-xs font-medium">
            <span class="text-green-500">&copy;</span>
            <span class="text-slate-500"> ${new Date().getFullYear()} </span>
            <span class="text-green-400 font-bold">Z-TRONIK</span>
            <span class="text-slate-500"> &middot; All Rights Reserved.</span>
        </div>`;
    }

    // ===================== INIT =====================
    async function init() {
        // Restore session DULU sebelum apapun, agar localStorage tidak terhapus
        restoreSession();

        // Render awal (tampilkan halaman sesuai session yang di-restore)
        render();

        // Load data di background
        const usersResult = await apiCall('getUsers');
        if (usersResult.success) {
            state.users = usersResult.users || [];
        } else {
            state.users = [
                { id: '1234567890', name: 'Budi Santoso',   address: 'Jl. Merdeka No. 1',    phone: '08123456789', stamps: 3,  maxStamps: 0, history: [], createdAt: Date.now() - 3000 },
                { id: '2345678901', name: 'Siti Nurhaliza', address: 'Jl. Kenanga No. 5',     phone: '08234567890', stamps: 7,  maxStamps: 0, history: [], createdAt: Date.now() - 2000 },
                { id: '3456789012', name: 'Ahmad Rahman',   address: 'Jl. Sudirman No. 10',   phone: '08345678901', stamps: 10, maxStamps: 0, history: [], createdAt: Date.now() - 1000 }
            ];
        }

        // Load settings
        const settingsResult = await apiCall('getSettings');
        if (settingsResult.success && settingsResult.settings) {
            const s = settingsResult.settings;
            if (s.admin_username) adminCredentials.username = s.admin_username;
            if (s.admin_password) adminCredentials.password = s.admin_password;
            if (s.max_stamps)     state.maxStamps = parseInt(s.max_stamps) || 20;
        }

        // Load rewards
        const rewardsResult = await apiCall('getRewards');
        if (rewardsResult.success && rewardsResult.rewards && rewardsResult.rewards.length > 0) {
            state.rewards = rewardsResult.rewards;
        }

        // Aktifkan loading overlay untuk aksi berikutnya
        state._appReady = true;

        render();
    }

    init();
</script>
</body>
</html>
